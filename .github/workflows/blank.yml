name: Vocab Francais Jeune - Quotidien

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

jobs:
  vocab-du-jour:
    runs-on: ubuntu-latest
    steps:
      - name: Generer et envoyer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OUTLOOK_PASSWORD: ${{ secrets.OUTLOOK_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          import smtplib
          import os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          # 1. Appel API Anthropic
          payload = {
            "model": "claude-haiku-4-5-20251001",
            "max_tokens": 800,
            "messages": [{
              "role": "user",
              "content": "Tu es un expert du langage jeune francais. Genere 2 mots ou expressions jeunes francais que je ne connais pas. Mots a exclure: stellaire, lunaire, matrixe, zinzin, claque au sol, dinguerie, binks, dedave, det, en PLS, soumsoum, jpp, il flex, punto. Format: 1. MOT : definition. Exemple : phrase. 2. MOT : definition. Exemple : phrase."
            }]
          }

          req = urllib.request.Request(
            "https://api.anthropic.com/v1/messages",
            data=json.dumps(payload).encode(),
            headers={
              "x-api-key": os.environ["ANTHROPIC_API_KEY"],
              "anthropic-version": "2023-06-01",
              "content-type": "application/json"
            }
          )

          with urllib.request.urlopen(req) as resp:
            data = json.loads(resp.read())

          print("Reponse API OK")
          print(data)

          if "error" in data:
            message = "ERREUR: " + data["error"]["message"]
          else:
            message = data["content"][0]["text"]

          print("Message:", message)

          # 2. Envoi email
          msg = MIMEMultipart()
          msg["From"] = "jean.vieville.immo69@outlook.com"
          msg["To"] = "caporali.nicolas@gmail.com"
          msg["Subject"] = "Vocab francais jeune du jour"
          msg.attach(MIMEText(message, "plain", "utf-8"))

          with smtplib.SMTP("smtp-mail.outlook.com", 587) as server:
            server.starttls()
            server.login("jean.vieville.immo69@outlook.com", os.environ["OUTLOOK_PASSWORD"])
            server.sendmail("jean.vieville.immo69@outlook.com", "caporali.nicolas@gmail.com", msg.as_string())

          print("Email envoye !")
          PYEOF
